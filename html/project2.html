<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/project22.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project22</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="signup-container">
        <div class="h1">
            <h1>Join LinkedIn now — it's free!</h1>
        </div>
        <form class="signup-card">
            <div class="input-group">
                <label for="email">Email or phone number</label>
                <input type="text" id="email" name="email" required>
                <label for="p">Please enter your email address or mobile number.</label>
            </div>

            <div class="input-group">
                <label for="password">Password (6+ characters)</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required>
                    <span class="show-toggle">Show</span>
                </div>
            </div>

            <p class="terms">
                By clicking Agree & Join or Continue, you agree to the LinkedIn
                <a href="#">User Agreement</a>, <a href="#">Privacy Policy</a>, and <a href="#">Cookie Policy</a>.
            </p>

            <button type="submit" class="btn-primary">Agree & Join</button>

            <div class="divider">
                <span>or</span>
            </div>

            <p class="signin-link">
                Already on LinkedIn? <a href="#">Sign in</a>
            </p>
        </form>

        <p class="business-help">Looking to create a page for a business? <a href="#">Get help</a></p>
    </div>
</body>

</html>
