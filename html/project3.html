<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/project33.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="nav-header">
        <img src="/multimedia/download-removebg-preview.png" alt="LinkedIn Logo" class="logo">
    </nav>

    <main class="login-wrapper">
        <div class="login-card">
            <h1>Sign in</h1>
            
            <div class="social-buttons">
                <button class="social-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    <span>Continue as Timothy</span>
                </button>
                <button class="social-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft">
                    <span>Sign in with Microsoft</span>
                </button>
                <button class="social-btn">
                    <i class="fab fa-apple"></i>
                    <span>Sign in with Apple</span>
                </button>
            </div>

            <p class="legal-text">
                By clicking Continue, you agree to LinkedIn’s <a href="#">User Agreement</a>, <a href="#">Privacy Policy</a>, and <a href="#">Cookie Policy</a>.
            </p>

            <div class="divider"><span>or</span></div>

            <form>
                <div class="input-container">
                    <input type="text" id="email" placeholder="Email or phone" required>
                </div>
                <div class="input-container password-container">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" class="toggle-password">Show</button>
                </div>

                <a href="#" class="forgot-link">Forgot password?</a>

                <button type="submit" class="signin-btn">Sign in</button>
                        </div>
            </form>


    </main>

</body>
</html>
